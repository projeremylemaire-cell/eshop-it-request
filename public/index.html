<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eShop · Demande IT</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--blue:#2563eb;
--blue-dark:#1e40af;
--green:#10b981;
--red:#ef4444;
--slate:#64748b;
--border:#e5e7eb;
--bg:#f8fafc;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#eef4ff;
padding:30px 15px;
}

.container{
max-width:760px;
margin:auto;
}

.card{
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.header{
background:linear-gradient(135deg,#1d4ed8,#3b82f6);
padding:28px;
color:#fff;
}

.header h1{
font-size:34px;
font-weight:800;
margin-bottom:8px;
}

.header p{
opacity:.9;
font-size:15px;
}

.progress{
display:flex;
margin-top:22px;
gap:10px;
}

.p-step{
flex:1;
height:8px;
border-radius:99px;
background:rgba(255,255,255,.25);
overflow:hidden;
}

.p-step.active::after{
content:'';
display:block;
height:100%;
width:100%;
background:#22c55e;
}

.body{
padding:32px;
}

.step{display:none}
.step.active{display:block}

.field{
margin-bottom:22px;
}

label{
display:block;
font-size:13px;
font-weight:700;
margin-bottom:8px;
color:#334155;
}

input,textarea,select{
width:100%;
padding:12px 14px;
border:1px solid var(--border);
border-radius:12px;
font-size:14px;
font-family:inherit;
outline:none;
}

textarea{
min-height:120px;
resize:vertical;
}

input:focus,textarea:focus,select:focus{
border-color:var(--blue);
}

.two{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.chips{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.chip{
padding:10px 14px;
border-radius:999px;
border:1px solid var(--border);
cursor:pointer;
font-size:13px;
font-weight:600;
background:#fff;
}

.chip.active{
background:#eff6ff;
border-color:var(--blue);
color:var(--blue);
}

.footer{
padding:24px 32px;
display:flex;
gap:12px;
border-top:1px solid #f1f5f9;
}

.footer .spacer{flex:1}

button{
border:none;
cursor:pointer;
font-family:inherit;
font-weight:700;
padding:12px 22px;
border-radius:12px;
font-size:14px;
}

.btn-back{
background:#fff;
border:1px solid var(--border);
}

.btn-next{
background:var(--blue);
color:#fff;
}

.btn-submit{
background:linear-gradient(135deg,#10b981,#059669);
color:#fff;
display:none;
}

.error-banner{
margin-top:18px;
padding:14px;
border-radius:14px;
background:#fef2f2;
color:#dc2626;
display:none;
font-size:14px;
font-weight:600;
}

.error-banner.show{
display:block;
}

.recap{
border:1px solid var(--border);
border-radius:16px;
overflow:hidden;
}

.row{
display:grid;
grid-template-columns:180px 1fr;
padding:14px 16px;
border-bottom:1px solid #f1f5f9;
font-size:14px;
}

.row:last-child{border-bottom:none}

.row b{
font-size:12px;
text-transform:uppercase;
color:#94a3b8;
}

.success{
display:none;
text-align:center;
padding:40px 20px;
}

.success.show{
display:block;
}

.success-icon{
width:82px;
height:82px;
border-radius:50%;
margin:auto;
background:linear-gradient(135deg,#10b981,#059669);
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
color:#fff;
margin-bottom:24px;
}

.success h2{
font-size:32px;
margin-bottom:12px;
}

.success p{
color:var(--slate);
line-height:1.6;
margin-bottom:20px;
}

.tags{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin-bottom:24px;
}

.tag{
padding:6px 12px;
background:#f1f5f9;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.btn-reset{
background:var(--blue-dark);
color:#fff;
}

@media(max-width:700px){
.two{grid-template-columns:1fr}
.row{grid-template-columns:1fr}
.body,.footer{padding:22px}
.header h1{font-size:28px}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header">
<h1>Nouvelle demande</h1>
<p>Soumets ta demande au CP Métier — sans passer par Jira</p>

<div class="progress">
<div class="p-step active"></div>
<div class="p-step active"></div>
<div class="p-step active"></div>
<div class="p-step"></div>
</div>
</div>

<div class="body">

<!-- SUCCESS -->
<div class="success" id="successView">
<div class="success-icon">✓</div>
<h2>Demande envoyée !</h2>
<p>Ta demande <strong id="successTitle"></strong> a bien été transmise au board Notion.</p>

<div class="tags" id="successTags"></div>

<button class="btn-reset" onclick="location.reload()">Nouvelle demande</button>
</div>

<!-- STEP 1 -->
<div class="step active" id="step1">

<div class="field">
<label>Titre</label>
<input id="titre">
</div>

<div class="field">
<label>Demandeur</label>
<input id="demandeur">
</div>

<div class="two">

<div class="field">
<label>Email</label>
<input id="email">
</div>

<div class="field">
<label>Equipe</label>
<input id="equipe">
</div>

</div>

</div>

<!-- STEP 2 -->
<div class="step" id="step2">

<div class="field">
<label>Nature</label>
<div class="chips" id="natureGroup">
<div class="chip" onclick="pick('nature',this)">Run</div>
<div class="chip" onclick="pick('nature',this)">Projet</div>
<div class="chip" onclick="pick('nature',this)">Quick Win</div>
</div>
</div>

<div class="field">
<label>Priorité</label>
<div class="chips" id="prioGroup">
<div class="chip" onclick="pick('priorite',this)">🔴 Critique</div>
<div class="chip" onclick="pick('priorite',this)">🟠 Haute</div>
<div class="chip" onclick="pick('priorite',this)">🟡 Moyenne</div>
</div>
</div>

<div class="field">
<label>Périmètres</label>
<div class="chips">
<div class="chip" onclick="toggleLabel(this)">Algolia</div>
<div class="chip" onclick="toggleLabel(this)">Checkout</div>
<div class="chip" onclick="toggleLabel(this)">CMS</div>
<div class="chip" onclick="toggleLabel(this)">Search</div>
</div>
</div>

</div>

<!-- STEP 3 -->
<div class="step" id="step3">

<div class="field">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<div class="field">
<label>Impact</label>
<input id="impact">
</div>

<div class="two">

<div class="field">
<label>Deadline</label>
<input type="date" id="deadline">
</div>

<div class="field">
<label>Lien</label>
<input id="lien">
</div>

</div>

</div>

<!-- STEP 4 -->
<div class="step" id="step4">

<div class="recap" id="recapCard"></div>

<div class="error-banner" id="errorBanner"></div>

</div>

</div>

<div class="footer" id="formFooter">
<button class="btn-back" onclick="prevStep()" id="btnBack" style="display:none">← Retour</button>
<div class="spacer"></div>
<button class="btn-next" onclick="nextStep()" id="btnNext">Continuer →</button>
<button class="btn-submit" onclick="submitForm()" id="btnSubmit">✓ Envoyer</button>
</div>

</div>
</div>

<script>
let currentStep=1;

const state={
nature:'',
priorite:'',
labels:[]
};

function g(id){
return document.getElementById(id).value.trim();
}

function nextStep(){
if(currentStep===3) buildRecap();

currentStep++;
if(currentStep>4) currentStep=4;
updateUI();
}

function prevStep(){
currentStep--;
if(currentStep<1) currentStep=1;
updateUI();
}

function updateUI(){

document.querySelectorAll('.step').forEach((s,i)=>{
s.classList.toggle('active',i+1===currentStep);
});

document.getElementById('btnBack').style.display=currentStep>1?'block':'none';
document.getElementById('btnNext').style.display=currentStep<4?'block':'none';
document.getElementById('btnSubmit').style.display=currentStep===4?'block':'block':'none';
}

function pick(field,el){
el.parentNode.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
el.classList.add('active');
state[field]=el.innerText.trim();
}

function toggleLabel(el){
el.classList.toggle('active');

state.labels=[...document.querySelectorAll('.chips .chip.active')]
.map(x=>x.innerText.trim())
.filter(x=>!x.includes('Critique') && !x.includes('Haute') && !x.includes('Moyenne') && x!=='Run' && x!=='Projet' && x!=='Quick Win');
}

function buildRecap(){

document.getElementById('recapCard').innerHTML=`
<div class="row"><b>Titre</b><div>${g('titre')}</div></div>
<div class="row"><b>Demandeur</b><div>${g('demandeur')}</div></div>
<div class="row"><b>Email</b><div>${g('email')}</div></div>
<div class="row"><b>Equipe</b><div>${g('equipe')}</div></div>
<div class="row"><b>Nature</b><div>${state.nature}</div></div>
<div class="row"><b>Priorité</b><div>${state.priorite}</div></div>
<div class="row"><b>Périmètres</b><div>${state.labels.join(', ')}</div></div>
<div class="row"><b>Description</b><div>${g('description')}</div></div>
<div class="row"><b>Impact</b><div>${g('impact')}</div></div>
`;
}

async function submitForm(){

const btn=document.getElementById('btnSubmit');
const banner=document.getElementById('errorBanner');

banner.classList.remove('show');
btn.disabled=true;
btn.innerText='⏳ Envoi...';

const payload={
titre:g('titre'),
demandeur:g('demandeur'),
email:g('email'),
equipe:g('equipe'),
nature:state.nature,
priorite:state.priorite,
labels:state.labels,
description:g('description'),
impact:g('impact'),
deadline:g('deadline'),
lien:g('lien')
};

try{

const res=await fetch('/submit',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(payload)
});

const data=await res.json();

if(!res.ok){
throw new Error(data.error || 'Erreur serveur');
}

document.getElementById('successTitle').innerText=`"${g('titre')}"`;

document.getElementById('successTags').innerHTML=
[state.nature,state.priorite,...state.labels]
.map(t=>`<span class="tag">${t}</span>`)
.join('');

document.querySelector('.header').style.display='none';
document.querySelectorAll('.step').forEach(s=>s.style.display='none');
document.getElementById('formFooter').style.display='none';
document.getElementById('successView').classList.add('show');

}
catch(err){

btn.disabled=false;
btn.innerText='✓ Envoyer';

banner.innerText='❌ '+err.message;
banner.classList.add('show');

}

}
</script>

</body>
</html>
